<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle Eng — Multilingual</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Tela inicial -->
  <div id="screen-start">
    <h1 class="start-title">WORDLE ENG</h1>
    <p class="start-subtitle">Escolha o idioma / Choose your language</p>
    <div class="start-actions">
      <button class="btn-language" data-language="pt">Português 🇧🇷</button>
      <button class="btn-language" data-language="en">English 🇺🇸</button>
    </div>
  </div>

  <!-- Tela do jogo -->
  <div id="screen-game" class="hidden">
    <p id="instruction-message"></p>

    <div class="stats-bar">
      <div>SCORE <span id="score-value">0</span></div>
      <div>ROUND <span id="round-value">1</span></div>
    </div>

    <!-- Tabuleiro gerado pelo Controller/View via JS -->
    <div id="board" role="grid" aria-label="Wordle board"></div>

    <!-- Feedback flutuante -->
    <div id="feedback-message" class="feedback" role="alert" aria-live="polite"></div>

    <!-- Teclado virtual -->
    <div class="virtual-keyboard" aria-label="Virtual keyboard">
      <div class="keyboard-row">
        <button class="key" data-key="Q">Q</button>
        <button class="key" data-key="W">W</button>
        <button class="key" data-key="E">E</button>
        <button class="key" data-key="R">R</button>
        <button class="key" data-key="T">T</button>
        <button class="key" data-key="Y">Y</button>
        <button class="key" data-key="U">U</button>
        <button class="key" data-key="I">I</button>
        <button class="key" data-key="O">O</button>
        <button class="key" data-key="P">P</button>
      </div>
      <div class="keyboard-row">
        <button class="key" data-key="A">A</button>
        <button class="key" data-key="S">S</button>
        <button class="key" data-key="D">D</button>
        <button class="key" data-key="F">F</button>
        <button class="key" data-key="G">G</button>
        <button class="key" data-key="H">H</button>
        <button class="key" data-key="J">J</button>
        <button class="key" data-key="K">K</button>
        <button class="key" data-key="L">L</button>
      </div>
      <div class="keyboard-row">
        <button class="key key--wide" data-key="ENTER">ENTER</button>
        <button class="key" data-key="Z">Z</button>
        <button class="key" data-key="X">X</button>
        <button class="key" data-key="C">C</button>
        <button class="key" data-key="V">V</button>
        <button class="key" data-key="B">B</button>
        <button class="key" data-key="N">N</button>
        <button class="key" data-key="M">M</button>
        <button class="key key--wide" data-key="BACKSPACE">DEL</button>
      </div>
    </div>

    <!-- Overlay de fim de jogo -->
    <div id="game-overlay" class="game-overlay hidden">
      <div class="overlay-card">
        <p id="overlay-title" class="overlay-title"></p>
        <p id="overlay-word"  class="overlay-word"></p>
        <p id="overlay-score" class="overlay-score"></p>
        <div class="overlay-actions">
          <button id="btn-restart" class="btn-action btn-action--primary">Reiniciar</button>
          <button id="btn-menu"    class="btn-action btn-action--secondary">Menu Inicial</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts MVC (ordem importa: Model, View, Controller) -->
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>

</body>
</html>
